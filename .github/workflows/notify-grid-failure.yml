# .github/workflows/notify-grid-failure.yml
#
# Detects when the grid has failed (gone off-grid) and sends a WhatsApp
# notification so you can be mindful of power usage.
# Also sends an all-clear when the grid is restored.
#
# Required GitHub Secrets:
#   WHATSAPP_PHONE    Your phone number with country code
#   WHATSAPP_APIKEY   Your CallMeBot API key
#   WHATSAPP_PHONE2   Second phone number
#   WHATSAPP_APIKEY2  Second CallMeBot API key

name: Notify — Grid Failure

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Send a test notification without affecting the grid status flag"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "test_failure"
          - "test_restored"


jobs:
  check-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check grid status and notify on change
        env:
          WHATSAPP_PHONE:   ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_APIKEY:  ${{ secrets.WHATSAPP_APIKEY }}
          WHATSAPP_PHONE2:  ${{ secrets.WHATSAPP_PHONE2 }}
          WHATSAPP_APIKEY2: ${{ secrets.WHATSAPP_APIKEY2 }}
          TEST_MODE:        ${{ github.event.inputs.test_mode || 'false' }}
        run: |
          python3 - <<'PYEOF'
          import json, os, time, urllib.request, urllib.parse, datetime

          PHONE    = os.environ["WHATSAPP_PHONE"]
          APIKEY   = os.environ["WHATSAPP_APIKEY"]
          PHONE2   = os.environ["WHATSAPP_PHONE2"]
          APIKEY2  = os.environ["WHATSAPP_APIKEY2"]
          FLAG     = "data/.grid_status"   # contains "online" or "offline"

          def send_whatsapp(msg):
              encoded = urllib.parse.quote(msg)
              for phone, apikey in [(PHONE, APIKEY), (PHONE2, APIKEY2)]:
                  url = f"https://api.callmebot.com/whatsapp.php?phone={phone}&text={encoded}&apikey={apikey}"
                  try:
                      urllib.request.urlopen(url)
                      print(f"  ✅ Sent to {phone[-4:]}")
                  except Exception as e:
                      print(f"  ✗ Failed to send to {phone[-4:]}: {e}")


          # ── Test mode ────────────────────────────────────────────────────
          test_mode = os.environ.get("TEST_MODE", "false")
          if test_mode == "test_failure":
              print("🧪 TEST MODE: Sending fake grid failure notification")
              msg = (
                  f"🧪 *[TEST] Grid Failure Detected!*\n"
                  f"This is a test notification only — your grid is fine.\n\n"
                  f"🔋 Battery SOC: *85%*\n"
                  f"🏠 Current load: *2.50 kW*\n"
                  f"⏱ Estimated runtime: *5.5 hrs* at current usage\n\n"
                  f"💡 Consider switching off non-essential appliances to extend battery life.\n"
                  f"🕐 [TEST TIME] SAST"
              )
              send_whatsapp(msg)
              print("🧪 Test complete — flag NOT updated")
              exit(0)
          elif test_mode == "test_restored":
              print("🧪 TEST MODE: Sending fake grid restored notification")
              msg = (
                  f"🧪 *[TEST] Grid Restored!*\n"
                  f"This is a test notification only — your grid is fine.\n\n"
                  f"🔋 Battery SOC: *72%*\n"
                  f"🕐 [TEST TIME] SAST"
              )
              send_whatsapp(msg)
              print("🧪 Test complete — flag NOT updated")
              exit(0)

          # ── Load latest data ──────────────────────────────────────────────
          try:
              with open("data/latest.json") as f:
                  data = json.load(f)
              rows = data.get("rows", [])
          except Exception as e:
              print(f"Could not read latest.json: {e}")
              exit(0)

          if len(rows) < 3:
              print("Not enough rows yet")
              exit(0)

          # ── Determine current grid status ─────────────────────────────────
          # Use last 6 readings (~30 min) for more reliable state detection
          recent      = rows[-6:] if len(rows) >= 6 else rows
          last        = rows[-1]
          time_str    = last.get("time", "")[-8:-3] + " SAST"
          soc         = last.get("soc_pct", 0)
          load        = last.get("consumption_kw", 0)
          grid_values = [r.get("grid_kw", 0) for r in recent]
          pv_values   = [r.get("pv_kw", 0)   for r in recent]

          battery_kw  = last.get("battery_kw", 0)
          pv_now      = last.get("pv_kw", 0)
          all_pv_zero = all(p < 0.1 for p in pv_values)

          # ── Time-of-day guard ─────────────────────────────────────────────
          try:
              from datetime import datetime
              ts   = last.get("time", "")
              dt   = datetime.strptime(ts, "%Y-%m-%d %H:%M:%S")
              hour = dt.hour + dt.minute / 60
          except Exception:
              hour = 12

          is_night = hour >= 19.0 or hour < 7.0

          # ── Transition detection: did grid JUST drop? ─────────────────────
          # Key insight: your inverter runs on battery by choice at night even
          # when the grid is available. So "no grid now" is NOT a failure signal.
          # A real failure is: grid was CONSISTENTLY present, then suddenly gone.
          #
          # Look at a longer window (last 12 readings = ~1 hour):
          # - "was_on_grid": grid was clearly active in the first half of the window
          # - "now_off_grid": grid has been absent in ALL of the last 3 readings
          # Both must be true simultaneously for a genuine failure.
          long_window   = rows[-12:] if len(rows) >= 12 else rows
          first_half    = long_window[:len(long_window)//2]
          last_3        = rows[-3:]

          was_on_grid   = sum(1 for r in first_half if abs(r.get("grid_kw", 0)) > 0.15) >= 2
          now_off_grid  = all(abs(r.get("grid_kw", 0)) <= 0.15 for r in last_3)
          grid_active   = sum(1 for g in grid_values if abs(g) > 0.15) >= 2
          grid_is_online = grid_active

          # ── SOC trajectory ────────────────────────────────────────────────
          soc_values  = [r.get("soc_pct", soc) for r in rows[-6:]]
          soc_drop    = soc_values[0] - soc_values[-1]

          # System has meaningful load
          has_load = load > 0.1
          if not has_load:
              print(f"System load is {load:.2f} kW — too low to detect grid state reliably")
              exit(0)

          # ── Failure classification ────────────────────────────────────────
          # ONLY flag as failure if there was a clear TRANSITION:
          # grid was present → grid is now gone
          # This prevents false alarms when inverter simply runs on battery
          # by choice (normal evening/night operation)
          #
          # Additional guard: during known solar-only hours (10:00-16:00)
          # the inverter may not draw from grid at all even when it's available
          # so we also require PV to be zero to confirm it's not just solar cover
          is_solar_hours = 10.0 <= hour <= 16.0

          if is_night:
              # Night: only alert on genuine transition AND abnormally high load
              # Normal night load for this home: 0.3-1.5 kW from battery
              # Abnormal: >3 kW sustained at night with grid gone = likely real failure
              clear_failure    = was_on_grid and now_off_grid and all_pv_zero and load > 3.0
              possible_failure = was_on_grid and now_off_grid and all_pv_zero and load > 2.0
          elif is_solar_hours:
              # Solar hours: grid may not be drawing even if available
              # Only flag if PV is also zero (overcast + no grid = likely failure)
              clear_failure    = was_on_grid and now_off_grid and all_pv_zero and battery_kw > 0.2
              possible_failure = False  # too ambiguous during solar hours
          else:
              # Daytime non-solar: transition + no PV = clear failure
              clear_failure    = was_on_grid and now_off_grid and all_pv_zero and battery_kw > 0.2
              possible_failure = was_on_grid and now_off_grid and (not all_pv_zero)

          print(f"Grid active:      {grid_active} (recent values: {[round(g,3) for g in grid_values[-3:]]})")
          print(f"Was on grid:      {was_on_grid} | Now off grid: {now_off_grid}")
          print(f"PV now:           {pv_now:.2f} kW | All PV zero: {all_pv_zero}")
          print(f"Battery:          {battery_kw:.2f} kW | SOC: {soc}% | SOC drop (30min): {soc_drop:.1f}%")
          print(f"Load:             {load:.2f} kW | Hour: {hour:.1f} | Night: {is_night} | Solar hrs: {is_solar_hours}")
          print(f"Clear failure:    {clear_failure}")
          print(f"Possible failure: {possible_failure}")

          # ── Read previous flag ────────────────────────────────────────────
          prev_status = "online"
          if os.path.exists(FLAG):
              with open(FLAG) as f:
                  prev_status = f.read().strip()
          print(f"Previous status:  {prev_status}")

          def write_flag(status):
              os.makedirs("data", exist_ok=True)
              with open(FLAG, "w") as f:
                  f.write(status)

          # ── State machine ─────────────────────────────────────────────────
          if clear_failure and prev_status == "online":
              # Grid just failed
              runtime_hrs = (soc / 100 * 16.07 / load) if load > 0 else 0
              night_note  = "⚠️ Night failure — battery is draining faster than normal.\n" if is_night else ""
              msg = (
                  f"🔌❌ *Grid Failure Detected!*\n"
                  f"{night_note}"
                  f"The grid has gone down. Your solar system has switched to battery/UPS mode.\n\n"
                  f"🔋 Battery SOC: *{soc}%*\n"
                  f"🏠 Current load: *{load:.2f} kW*\n"
                  f"⏱ Estimated runtime: *{runtime_hrs:.1f} hrs* at current usage\n\n"
                  f"💡 Consider switching off non-essential appliances to extend battery life.\n"
                  f"🔔 You will receive another message when the grid is restored.\n"
                  f"🕐 {time_str}"
              )
              print("⚠ Grid failure detected — sending notification")
              send_whatsapp(msg)
              write_flag("offline")

          elif possible_failure and prev_status == "online":
              # Ambiguous — PV is running but no grid draw; wait for confirmation
              # by writing a "pending" state; if next run also shows no grid, alert
              write_flag("pending")
              print("Grid draw zero but PV is active — writing pending state, will confirm next run")

          elif possible_failure and prev_status == "pending":
              # Two consecutive runs with no grid + PV active — likely a real failure
              msg = (
                  f"🔌⚠️ *Grid May Be Down*\n"
                  f"No grid activity detected for the last ~20 minutes.\n"
                  f"Your solar system is running on PV + battery.\n\n"
                  f"🔋 Battery SOC: *{soc}%*\n"
                  f"☀️ PV output: *{pv_now:.2f} kW*\n"
                  f"🏠 Current load: *{load:.2f} kW*\n\n"
                  f"💡 Monitor your battery level — it will drain faster after sunset.\n"
                  f"🕐 {time_str}"
              )
              print("⚠ Persistent no-grid state — sending possible failure notification")
              send_whatsapp(msg)
              write_flag("offline")

          elif grid_is_online and prev_status in ("offline", "pending"):
              # Grid has been restored — calculate outage duration from flag timestamp
              try:
                  flag_mtime  = os.path.getmtime(FLAG)
                  outage_mins = int((time.time() - flag_mtime) / 60)
                  if outage_mins < 60:
                      duration_str = f"{outage_mins} minutes"
                  else:
                      hrs  = outage_mins // 60
                      mins = outage_mins % 60
                      duration_str = f"{hrs}h {mins}m"
              except Exception:
                  duration_str = "unknown duration"
              soc_delta = ""
              msg = (
                  f"🔌✅ *Grid Restored!*\n"
                  f"Mains power is back. Your system has reconnected to the grid.\n\n"
                  f"⏱ Outage duration: *{duration_str}*\n"
                  f"🔋 Battery SOC: *{soc}%*\n"
                  f"🕐 {time_str}"
              )
              print("✅ Grid restored — sending all-clear notification")
              send_whatsapp(msg)
              write_flag("online")

          else:
              print(f"No state change (grid {'online' if grid_is_online else 'offline'}, prev: {prev_status}) — no notification")

          PYEOF

      - name: Commit grid status flag if updated
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/.grid_status 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: grid status flag update"
          git push 2>/dev/null || true
