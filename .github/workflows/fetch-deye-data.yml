# .github/workflows/fetch-deye-data.yml
#
# Runs every 30 minutes to fetch solar data from the Deye Cloud API.
# Can also be triggered manually with an optional date override.
#
# Required GitHub Secrets:
#   DEYE_APP_ID, DEYE_APP_SECRET, DEYE_EMAIL, DEYE_PASSWORD, DEYE_STATION_ID

name: Fetch Deye Solar Data

on:
  schedule:
    # Runs every 30 minutes
    - cron: "*/30 * * * *"

  # Manual trigger with optional date input
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Date to fetch (YYYY-MM-DD). Leave empty for today.'
        required: false
        default: ''

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Deye data
        env:
          DEYE_APP_ID:     ${{ secrets.DEYE_APP_ID }}
          DEYE_APP_SECRET: ${{ secrets.DEYE_APP_SECRET }}
          DEYE_EMAIL:      ${{ secrets.DEYE_EMAIL }}
          DEYE_PASSWORD:   ${{ secrets.DEYE_PASSWORD }}
          DEYE_STATION_ID: ${{ secrets.DEYE_STATION_ID }}
          TARGET_DATE:     ${{ github.event.inputs.target_date }}
        run: python fetch_deye_data.py

      - name: Commit and push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Solar data update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
