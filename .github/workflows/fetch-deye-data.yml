# .github/workflows/fetch-deye-data.yml
#
# Runs every day at 23:30 SAST (21:30 UTC) to fetch the day's solar data
# from the Deye Cloud API and commit it to the repo so the dashboard
# auto-loads it on next page open.
#
# Required GitHub Secrets (Settings → Secrets → Actions → New repository secret):
#   DEYE_APP_ID       Your DeyeCloud AppId
#   DEYE_APP_SECRET   Your DeyeCloud AppSecret
#   DEYE_EMAIL        Your DeyeCloud account email
#   DEYE_PASSWORD     Your DeyeCloud account password (plain text — script hashes it)
#   DEYE_STATION_ID   Your station ID (run workflow once with empty value to discover it)

name: Fetch Deye Solar Data

on:
  schedule:
    # 21:30 UTC = 23:30 SAST (UTC+2)
    # Adjust if your timezone offset differs (e.g. during daylight saving)
    - cron: "30 21 * * *"

  # Allow manual trigger from the Actions tab for testing
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit back to the repo

    steps:
      - name: Checkout repository
        uses: actions/setup-python@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Deye data
        env:
          DEYE_APP_ID:     ${{ secrets.DEYE_APP_ID }}
          DEYE_APP_SECRET: ${{ secrets.DEYE_APP_SECRET }}
          DEYE_EMAIL:      ${{ secrets.DEYE_EMAIL }}
          DEYE_PASSWORD:   ${{ secrets.DEYE_PASSWORD }}
          DEYE_STATION_ID: ${{ secrets.DEYE_STATION_ID }}
        run: python fetch_deye_data.py

      - name: Commit and push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if something actually changed
          git diff --staged --quiet || git commit -m "chore: solar data $(date -u +'%Y-%m-%d')"
          git push
